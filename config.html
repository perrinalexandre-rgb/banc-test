<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>enovaQ — Configuration</title>
<style>
  :root { --fond:#0f172a; --carte:#1e293b; --bord:#334155; --txt:#e2e8f0;
          --gris:#94a3b8; --ok:#22c55e; --ko:#ef4444; --acc:#38bdf8; --org:#f59e0b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--fond); color:var(--txt); font-family:system-ui,sans-serif;
         max-width:640px; margin:0 auto; padding:16px; }
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  h1 { font-size:1.25rem; } h1 span { color:var(--acc); }
  nav a { color:var(--acc); text-decoration:none; font-size:.9rem; }
  .carte { background:var(--carte); border:1px solid var(--bord); border-radius:12px;
           padding:16px; margin-bottom:14px; }
  label { display:block; color:var(--gris); font-size:.85rem; margin:12px 0 4px; }
  input[type=number], input[type=password], select {
    width:100%; background:var(--fond); color:var(--txt); border:1px solid var(--bord);
    border-radius:8px; padding:8px 10px; font-size:.95rem; }
  .switch { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .switch input { width:20px; height:20px; accent-color:var(--acc); }
  button { width:100%; margin-top:16px; background:var(--acc); color:#04263a; border:none;
           border-radius:10px; padding:12px; font-size:1rem; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.5; cursor:wait; }
  #suivi { margin-top:14px; padding:12px; border-radius:10px; font-size:.9rem; display:none; }
  #suivi.attente { display:block; background:rgba(245,158,11,.12);
                   border:1px solid var(--org); color:var(--org); }
  #suivi.applique { display:block; background:rgba(34,197,94,.12);
                    border:1px solid var(--ok); color:var(--ok); }
  #suivi.erreur { display:block; background:rgba(239,68,68,.12);
                  border:1px solid var(--ko); color:var(--ko); }
  .etat { display:flex; justify-content:space-between; font-size:.85rem;
          color:var(--gris); padding:3px 0; }
  .etat b { color:var(--txt); }
  pre { background:var(--fond); border:1px solid var(--bord); border-radius:8px;
        padding:10px; font-size:.75rem; white-space:pre-wrap; margin-top:10px; }
</style>
</head>
<body>

<header>
  <h1>enova<span>Q</span> — Configuration</h1>
  <nav><a href="index.html">← Supervision</a></nav>
</header>

<div class="carte">
  <div class="etat"><span>Chaufferie</span><b><select id="sel-device" style="width:auto"></select></b></div>
  <div class="etat"><span>Version appliquée par l'ESP32</span><b id="v-appliquee">?</b></div>
  <div class="etat"><span>Version en attente sur l'API</span><b id="v-attente">aucune</b></div>
  <div class="etat"><span>Dernier dépôt de mesures</span><b id="dernier">--</b></div>
</div>

<div class="carte">
  <label>Intervalle d'envoi des mesures (secondes, 5–3600)</label>
  <input type="number" id="intervalle" min="5" max="3600" value="30">

  <label>Seuil de température satellites (°C, 10–95)</label>
  <input type="number" id="seuil" min="10" max="95" step="0.5" value="50">

  <label>Circuits actifs</label>
  <div class="switch"><input type="checkbox" id="c1" checked><span>Circuit C1</span></div>
  <div class="switch"><input type="checkbox" id="c2" checked><span>Circuit C2</span></div>

  <label>Clé API (obligatoire pour écrire)</label>
  <input type="password" id="clef" placeholder="clé API">

  <button id="btn">Envoyer la configuration</button>
  <div id="suivi"></div>
  <pre id="apercu" style="display:none"></pre>
</div>

<script>
const $ = id => document.getElementById(id);
let deviceChoisi = null, versionEnvoyee = null;

/* etat courant : versions + prefill du formulaire depuis la config en attente */
async function rafraichirEtat() {
  try {
    const j = await (await fetch("/api/data", { cache:"no-store" })).json();
    const ids = Object.keys(j.devices || {});
    const sel = $("sel-device");
    if (ids.length && sel.options.length !== ids.length) {
      sel.innerHTML = ids.map(i=>`<option>${i}</option>`).join("");
      if (deviceChoisi && ids.includes(deviceChoisi)) sel.value = deviceChoisi;
    }
    deviceChoisi = sel.value || ids[0] || "chaufferie-01";

    const d = (j.devices || {})[deviceChoisi];
    const vApp = d ? (d.cfg_version ?? 0) : null;
    $("v-appliquee").textContent = vApp === null ? "device jamais vu" : "v" + vApp;
    $("dernier").textContent = d ? (d._received_at || "--") : "--";

    const cfgAttente = (j.configs || {})[deviceChoisi];
    $("v-attente").textContent = cfgAttente ? "v" + cfgAttente.cfg_version : "aucune";

    /* suivi de l'accuse de reception apres un envoi */
    if (versionEnvoyee !== null) {
      const s = $("suivi");
      if (vApp !== null && vApp >= versionEnvoyee) {
        s.className = "applique";
        s.textContent = "✓ Config v" + versionEnvoyee + " appliquée par l'ESP32 (et sauvée dans sa flash).";
        versionEnvoyee = null;
      } else {
        s.className = "attente";
        s.textContent = "⏳ Config v" + versionEnvoyee +
          " déposée sur l'API — en attente du prochain envoi de l'ESP32 (max = son intervalle actuel)...";
      }
    }
  } catch (e) { /* silencieux, retentera */ }
}

$("btn").addEventListener("click", async () => {
  const btn = $("btn"), s = $("suivi");
  btn.disabled = true;

  /* version = max(appliquee, en attente) + 1 */
  const vApp = parseInt(($("v-appliquee").textContent||"").replace("v",""))||0;
  const vAtt = parseInt(($("v-attente").textContent||"").replace("v",""))||0;
  const nouvelleVersion = Math.max(vApp, vAtt) + 1;

  const config = {
    cfg_version:  nouvelleVersion,
    intervalle_s: Math.min(3600, Math.max(5, parseInt($("intervalle").value)||30)),
    seuil_temp_c: Math.min(95, Math.max(10, parseFloat($("seuil").value)||50)),
    circuits: { C1: $("c1").checked, C2: $("c2").checked }
  };
  $("apercu").style.display = "block";
  $("apercu").textContent = "JSON envoyé :\n" + JSON.stringify(
    { device_id: deviceChoisi, config }, null, 2);

  try {
    const rep = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": $("clef").value },
      body: JSON.stringify({ device_id: deviceChoisi, config })
    });
    if (rep.status === 401) throw new Error("clé API invalide");
    if (!rep.ok) throw new Error("HTTP " + rep.status);
    versionEnvoyee = nouvelleVersion;
    s.className = "attente";
    s.textContent = "⏳ Config v" + nouvelleVersion + " déposée — en attente de l'ESP32...";
  } catch (e) {
    s.className = "erreur";
    s.textContent = "✗ Échec : " + e.message;
  }
  btn.disabled = false;
  rafraichirEtat();
});

$("sel-device").addEventListener("change", () => { deviceChoisi = $("sel-device").value; rafraichirEtat(); });
rafraichirEtat();
setInterval(rafraichirEtat, 5000);
</script>

</body>
</html>
